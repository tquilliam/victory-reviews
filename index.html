<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Victory Blinds — Reviews Dashboard</title>

<!--
  ============================================================================
  SETUP (one-time)
  ----------------------------------------------------------------------------
  1. In the Google Sheet:  File > Share > Publish to web
       - Choose the "All Reviews" tab, format = Comma-separated values (.csv)
       - Click Publish, copy the URL it gives you.
  2. Paste that URL below into CONFIG.csvUrl (replace the placeholder).
  3. Commit index.html to a GitHub repo, then Settings > Pages > deploy from
     the main branch. Your dashboard is the Pages URL.

  Note: this is an INTERNAL tool. GitHub Pages + a published CSV are public to
  anyone who has the link — keep the URL private. (noindex is set above so it
  won't show up in Google.)
  ============================================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #063B32;
    --green-soft: #0d5346;
    --red: #EB0242;
    --tan: #C9BEA4;
    --tan-soft: #f2eee5;
    --ink: #1a1d1c;
    --muted: #6b7370;
    --line: #e7e6e0;
    --card: #ffffff;
    --page: #f6f5f1;
    --good: #199e70;
    --star: #d99a00;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--page); color: var(--ink);
    font-family: "Figtree", system-ui, -apple-system, Arial, sans-serif;
    font-size: 15px; line-height: 1.5;
  }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 0 20px 64px; }

  header.top { background: var(--green); color: #fff; }
  .top-inner { max-width: 1120px; margin: 0 auto; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .wordmark { font-family: "Cormorant Garamond", Georgia, serif; font-size: 30px; letter-spacing: 3px; line-height: 1; text-transform: uppercase; border-bottom: 3px solid var(--red); padding-bottom: 3px; }
  .brand small { display: block; font-size: 12px; letter-spacing: 2px; color: var(--tan); text-transform: uppercase; margin-top: 4px; }
  .subtitle { font-size: 14px; color: rgba(255,255,255,.85); }
  .top a.sheet { display: inline-flex; align-items: center; gap: 7px; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,.35); padding: 8px 14px; border-radius: var(--radius); font-size: 14px; }
  .top a.sheet:hover { background: rgba(255,255,255,.1); }

  .section-label { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 28px 0 10px; }

  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-top: 22px; }
  .kpi { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px; }
  .kpi .label { font-size: 13px; color: var(--muted); }
  .kpi .value { font-size: 30px; font-weight: 600; color: var(--green); margin-top: 4px; }
  .kpi .value small { font-size: 14px; color: var(--muted); font-weight: 400; }

  .grid-2 { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
  @media (max-width: 780px) { .grid-2 { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; }
  .card h3 { margin: 0 0 14px; font-size: 15px; font-weight: 600; }

  .srow { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .dot { width: 11px; height: 11px; border-radius: 3px; flex: none; }
  .srow .nm { width: 120px; font-size: 14px; }
  .srow .track { flex: 1; height: 10px; background: var(--tan-soft); border-radius: 6px; overflow: hidden; }
  .srow .fill { display: block; height: 100%; border-radius: 6px; }
  .srow .num { font-size: 13px; color: var(--muted); width: 92px; text-align: right; }

  .rrow { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .rrow .rk { width: 30px; font-size: 13px; color: var(--muted); }
  .rrow .track { flex: 1; height: 12px; background: var(--tan-soft); border-radius: 6px; overflow: hidden; }
  .rrow .num { width: 70px; text-align: right; font-size: 13px; color: var(--muted); }

  table.staff { width: 100%; border-collapse: collapse; }
  table.staff td { padding: 10px 4px; border-bottom: 1px solid var(--line); font-size: 14px; }
  table.staff tr:last-child td { border-bottom: 0; }
  table.staff .role { color: var(--muted); font-size: 12px; }
  table.staff .cnt { text-align: right; color: var(--green); font-weight: 600; }

  .filters { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0 16px; }
  .filters select, .filters input {
    font: inherit; padding: 9px 12px; border: 1px solid var(--line); border-radius: var(--radius);
    background: #fff; color: var(--ink);
  }
  .filters input { flex: 1; min-width: 200px; }

  .review { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
  .review.flag { background: #eef7f2; border-color: #bfe3d3; }
  .review .meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .badge { font-size: 12px; padding: 3px 9px; border-radius: 999px; font-weight: 500; }
  .b-google { background: #e6f1fb; color: #0c447c; }
  .b-trustpilot { background: #e1f5ee; color: #0f6e56; }
  .b-productreview { background: #fadfd4; color: #8a3316; }
  .stars { color: var(--star); font-size: 13px; letter-spacing: 1px; }
  .review .who { font-size: 13px; color: var(--muted); }
  .review .staff { margin-left: auto; font-size: 12.5px; color: var(--good); display: inline-flex; align-items: center; gap: 5px; }
  .review .body { font-size: 14.5px; line-height: 1.55; }
  .review .reply { margin-top: 8px; padding-left: 12px; border-left: 3px solid var(--tan); color: var(--muted); font-size: 13.5px; }

  .matrix-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; }
  table.matrix { border-collapse: collapse; font-size: 13px; min-width: 100%; }
  table.matrix th, table.matrix td { padding: 9px 12px; text-align: center; white-space: nowrap; border-bottom: 1px solid var(--line); }
  table.matrix thead th { background: var(--green); color: #fff; font-weight: 500; }
  table.matrix th.sticky-col, table.matrix td.sticky-col { position: sticky; left: 0; text-align: left; background: #fff; font-weight: 500; min-width: 160px; z-index: 1; }
  table.matrix thead th.sticky-col { background: var(--green); z-index: 2; }
  table.matrix td.tot, table.matrix th.tot { font-weight: 600; color: var(--green); background: var(--tan-soft); }
  table.matrix tbody tr:last-child td { border-bottom: 0; }
  table.matrix td.hit { color: var(--green); font-weight: 500; }

  .muted { color: var(--muted); }
  .loading { text-align: center; padding: 60px 0; color: var(--muted); }
  a.rev-link { color: var(--red); text-decoration: none; font-size: 12.5px; }
  .foot { margin-top: 36px; font-size: 12.5px; color: var(--muted); text-align: center; }
  .chart-wrap { position: relative; width: 100%; height: 240px; }
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <div>
        <div class="wordmark">Victory</div>
        <small>Curtains and Blinds</small>
      </div>
      <div class="subtitle">Reviews dashboard</div>
    </div>
    <div style="text-align:right;">
      <a class="sheet" id="sheetLink" href="#" target="_blank" rel="noopener">Open Google Sheet ↗</a>
      <div class="subtitle" id="updated" style="margin-top:6px;"></div>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="content" class="loading">Loading reviews…</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CONFIG = {
  // 1) Paste your published "All Reviews" CSV URL here (see setup notes at top of file).
  csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRnxRyeiA020m3iiOWJV_NDM9x-shidyF33HawvXMBDEufDjxZfvp-vsJiSjwlnpQlRfxSJEc_2ATab/pub?gid=662554992&single=true&output=csv',
  // 2) Paste your published "Staff" CSV URL here (Publish to web > Staff tab > CSV).
  //    Used to classify Installers vs Sales reps. Falls back to a built-in list if left blank.
  staffCsvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRnxRyeiA020m3iiOWJV_NDM9x-shidyF33HawvXMBDEufDjxZfvp-vsJiSjwlnpQlRfxSJEc_2ATab/pub?gid=63709709&single=true&output=csv',
  // 3) Link the "Open Google Sheet" button to your sheet.
  sheetUrl: 'https://docs.google.com/spreadsheets/d/1V4RbXrXN4WPUhERaG1aqYQ7weHHnven0vMnkn5KGJmA/edit',
  payoutPerReview: 25,
};

const SOURCE_COLORS = { Google: '#2a78d6', Trustpilot: '#199e70', ProductReview: '#EB0242' };
const $ = (sel, el = document) => el.querySelector(sel);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
const num = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
const fmt = (n) => n.toLocaleString('en-AU');
const monthKey = (d) => { const m = String(d || '').match(/(\d{4})-(\d{2})/); if (m) return m[1] + '-' + m[2]; const dt = new Date(d); return isNaN(dt) ? '' : dt.toISOString().slice(0, 7); };
const dateVal = (d) => { const t = new Date(d).getTime(); return isNaN(t) ? 0 : t; };
const stars = (r) => '★★★★★☆☆☆☆☆'.slice(5 - Math.round(num(r)), 10 - Math.round(num(r)));
const splitNames = (s) => String(s == null ? '' : s).split(',').map((x) => x.trim()).filter(Boolean);
const staffUnion = (r) => [...new Set([...splitNames(r['Staff Mentioned']), ...splitNames(r['Staff (manual)'])])];
const INSTALLERS = new Set(['Mick (Adelaide)', 'Richie Currie', 'James Shaw', 'Sunil Navath', 'Mark Upton', 'Anthony Charles', 'Mick Delia', 'Mark Raybould', 'Jordan Amato', 'Samuel Collins', 'Ian Lloyd', 'Steve Ellis', 'Ash Turner', 'Blerim Ibraimovski', 'Glen Williamson', 'Hakan Seker', 'Jack Callanan', 'Jaechung Kim', 'Matthew Ribaux', 'Pascal Zandbergen', 'Tate Volitakis', 'Zach Brownlie', 'Justin Underwood']);
const ROLE = {};  // filled from the Staff CSV (name -> role); falls back to INSTALLERS set
const roleOf = (n) => {
  const r = ROLE[n];
  if (r) return /install/i.test(r) ? 'installer' : 'rep';
  return INSTALLERS.has(n) ? 'installer' : 'rep';
};

$('#sheetLink').href = CONFIG.sheetUrl;

let ALL = [];

function loadReviews() {
  Papa.parse(CONFIG.csvUrl, {
    download: true, header: true, skipEmptyLines: true,
    complete: (res) => { ALL = res.data.filter((r) => r.Source); ALL.forEach((r) => { r._staff = staffUnion(r); }); render(); },
    error: (err) => { $('#content').innerHTML = '<div class="loading">Couldn\'t load the sheet CSV.<br>Check CONFIG.csvUrl and that the tab is published to the web.<br><span class="muted">' + esc(err.message || err) + '</span></div>'; },
  });
}

if (CONFIG.staffCsvUrl && !/PASTE_/.test(CONFIG.staffCsvUrl)) {
  Papa.parse(CONFIG.staffCsvUrl, {
    download: true, header: true, skipEmptyLines: true,
    complete: (s) => { s.data.forEach((row) => { const n = String(row.Name || '').trim(); if (n) ROLE[n] = String(row.Role || '').trim(); }); loadReviews(); },
    error: () => loadReviews(),
  });
} else {
  loadReviews();
}

function render() {
  if (!ALL.length) { $('#content').innerHTML = '<div class="loading">No reviews found.</div>'; return; }

  const total = ALL.length;
  const avg = (ALL.reduce((s, r) => s + num(r.Rating), 0) / total) || 0;
  const five = ALL.filter((r) => Math.round(num(r.Rating)) === 5).length;
  const thisMonth = monthKey(new Date().toISOString());
  const newThis = ALL.filter((r) => monthKey(r.Date) === thisMonth).length;

  const bySource = {};
  ALL.forEach((r) => { const s = r.Source || 'Other'; (bySource[s] = bySource[s] || []).push(num(r.Rating)); });

  const dist = [0, 0, 0, 0, 0];
  ALL.forEach((r) => { const k = Math.round(num(r.Rating)); if (k >= 1 && k <= 5) dist[k - 1]++; });

  const months = {};
  const fivesByMonth = {};
  ALL.forEach((r) => {
    const k = monthKey(r.Date); if (!k) return;
    months[k] = (months[k] || 0) + 1;
    if (Math.round(num(r.Rating)) === 5) fivesByMonth[k] = (fivesByMonth[k] || 0) + 1;
  });
  const mKeys = Object.keys(months).sort().slice(-12);

  const staff = {};
  ALL.forEach((r) => r._staff.forEach((n) => { staff[n] = (staff[n] || 0) + 1; }));
  const topStaff = Object.entries(staff).sort((a, b) => b[1] - a[1]).slice(0, 8);

  const lastCap = ALL.map((r) => r['Captured At']).filter(Boolean).sort().pop();
  $('#updated').textContent = lastCap ? 'Updated ' + new Date(lastCap).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }) : '';

  $('#content').classList.remove('loading');
  $('#content').innerHTML = `
    <div class="kpis">
      <div class="kpi"><div class="label">Total reviews</div><div class="value">${fmt(total)}</div></div>
      <div class="kpi"><div class="label">Average rating</div><div class="value">${avg.toFixed(1)} <small>★</small></div></div>
      <div class="kpi"><div class="label">5-star</div><div class="value">${fmt(five)} <small>${Math.round(five / total * 100)}%</small></div></div>
      <div class="kpi"><div class="label">New this month</div><div class="value">${fmt(newThis)}</div></div>
    </div>

    <div class="section-label">Reviews per month</div>
    <div class="card">
      <div style="display:flex; gap:16px; font-size:12px; color:var(--muted); margin-bottom:10px;">
        <span style="display:inline-flex; align-items:center; gap:6px;"><span style="width:10px;height:10px;border-radius:2px;background:#063B32;"></span>5-star</span>
        <span style="display:inline-flex; align-items:center; gap:6px;"><span style="width:10px;height:10px;border-radius:2px;background:#cfe3da;"></span>Other</span>
      </div>
      <div class="chart-wrap"><canvas id="trend" role="img" aria-label="Reviews per month, 5-star vs other"></canvas></div>
    </div>

    <div class="grid-2" style="margin-top:20px;">
      <div class="card">
        <h3>By source</h3>
        ${Object.entries(bySource).map(([s, arr]) => {
          const a = arr.reduce((x, y) => x + y, 0) / arr.length;
          const pct = Math.round(arr.length / total * 100);
          const c = SOURCE_COLORS[s] || '#888';
          return `<div class="srow"><span class="dot" style="background:${c}"></span><span class="nm">${esc(s)}</span>
            <span class="track"><span class="fill" style="width:${pct}%;background:${c}"></span></span>
            <span class="num">${fmt(arr.length)} · ${a.toFixed(1)}★</span></div>`;
        }).join('')}
      </div>
      <div class="card">
        <h3>Rating breakdown</h3>
        ${[5, 4, 3, 2, 1].map((k) => {
          const cnt = dist[k - 1]; const pct = Math.round(cnt / total * 100);
          const col = k >= 4 ? 'var(--good)' : k === 3 ? '#eda100' : 'var(--red)';
          return `<div class="rrow"><span class="rk">${k}★</span>
            <span class="track"><span class="fill" style="display:block;height:100%;width:${pct}%;background:${col}"></span></span>
            <span class="num">${fmt(cnt)}</span></div>`;
        }).join('')}
      </div>
    </div>

    <div class="section-label">Most-mentioned staff</div>
    <div class="card">
      ${topStaff.length ? `<table class="staff">${topStaff.map(([n, c]) =>
        `<tr><td>${esc(n)}</td><td class="cnt">${c} mention${c === 1 ? '' : 's'}</td></tr>`).join('')}</table>`
        : '<div class="muted">No staff mentions found yet.</div>'}
    </div>

    <div class="section-label">5-star reviews · installers · by month</div>
    ${starMatrix('installer')}

    <div class="section-label">5-star reviews · sales reps · by month</div>
    ${starMatrix('rep')}

    <div class="section-label">Reviews</div>
    <div class="filters">
      <select id="fSource"><option value="">All sources</option>${Object.keys(bySource).map((s) => `<option>${esc(s)}</option>`).join('')}</select>
      <select id="fRating">
        <option value="">All ratings</option><option value="5">5 star</option><option value="4">4 star +</option>
        <option value="low">1–2 star</option>
      </select>
      <select id="fStaff"><option value="">Anyone mentioned</option><option value="named">Names a staff member</option></select>
      <select id="fRole"><option value="">All staff</option><option value="installer">Installers</option><option value="rep">Sales reps</option></select>
      <input id="fSearch" type="text" placeholder="Search reviews or a staff name" />
    </div>
    <div id="feed"></div>
    <div class="foot">Victory Curtains and Blinds — internal reviews dashboard · data from Google, Trustpilot and ProductReview.com.au</div>
  `;

  drawTrend(mKeys, mKeys.map((k) => months[k]), mKeys.map((k) => fivesByMonth[k] || 0));
  ['fSource', 'fRating', 'fStaff', 'fRole', 'fSearch'].forEach((id) => $('#' + id).addEventListener('input', renderFeed));
  renderFeed();
}

function renderFeed() {
  const src = $('#fSource').value, rt = $('#fRating').value, st = $('#fStaff').value;
  const q = $('#fSearch').value.trim().toLowerCase();
  let rows = ALL.slice().sort((a, b) => dateVal(b.Date) - dateVal(a.Date));
  if (src) rows = rows.filter((r) => r.Source === src);
  if (rt === '5') rows = rows.filter((r) => Math.round(num(r.Rating)) === 5);
  else if (rt === '4') rows = rows.filter((r) => num(r.Rating) >= 4);
  else if (rt === 'low') rows = rows.filter((r) => num(r.Rating) <= 2 && num(r.Rating) > 0);
  if (st === 'named') rows = rows.filter((r) => r._staff.length);
  const role = $('#fRole').value;
  if (role) rows = rows.filter((r) => r._staff.some((n) => roleOf(n) === role));
  if (q) rows = rows.filter((r) => ((r.Review || '') + ' ' + (r.Title || '') + ' ' + r._staff.join(' ') + ' ' + (r.Author || '')).toLowerCase().includes(q));

  const shown = rows.slice(0, 60);
  const bClass = (s) => 'b-' + String(s || '').toLowerCase().replace(/[^a-z]/g, '');
  $('#feed').innerHTML = (shown.length ? shown.map((r) => {
    const flagged = r._staff.join(', ');
    const when = r.Date ? new Date(r.Date).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
    return `<div class="review ${flagged ? 'flag' : ''}">
      <div class="meta">
        <span class="badge ${bClass(r.Source)}">${esc(r.Source)}</span>
        <span class="stars">${stars(r.Rating)}</span>
        <span class="who">${esc(r.Author || 'Anonymous')}${when ? ' · ' + when : ''}</span>
        ${flagged ? `<span class="staff"><i>◆</i> ${esc(flagged)}</span>` : ''}
      </div>
      ${r.Title ? `<div class="body" style="font-weight:600;">${esc(r.Title)}</div>` : ''}
      <div class="body">${esc(r.Review || '')}</div>
      ${r['Business Reply'] ? `<div class="reply">${esc(r['Business Reply'])}</div>` : ''}
      ${r.URL ? `<div style="margin-top:6px;"><a class="rev-link" href="${esc(r.URL)}" target="_blank" rel="noopener">View original ↗</a></div>` : ''}
    </div>`;
  }).join('') : '<div class="muted" style="padding:12px 0;">No reviews match those filters.</div>')
    + (rows.length > shown.length ? `<div class="muted" style="padding:8px 0;">Showing 60 of ${fmt(rows.length)} — narrow with filters above.</div>` : '');
}

function starMatrix(roleTarget) {
  const fives = ALL.filter((r) => Math.round(num(r.Rating)) === 5 && r._staff.length);
  const cell = {}, totals = {}, monthsSet = {};
  fives.forEach((r) => {
    const mk = monthKey(r.Date); if (!mk) return;
    r._staff.forEach((nm) => {
      if (roleTarget && roleOf(nm) !== roleTarget) return;
      monthsSet[mk] = true;
      (cell[nm] = cell[nm] || {})[mk] = ((cell[nm] || {})[mk] || 0) + 1;
      totals[nm] = (totals[nm] || 0) + 1;
    });
  });
  const staff = Object.keys(totals).sort((a, b) => totals[b] - totals[a]);
  if (!staff.length) return '<div class="card"><div class="muted">No 5-star reviews mention a staff member yet.</div></div>';
  const months = Object.keys(monthsSet).sort().reverse();
  const mLabel = (k) => { const [y, m] = k.split('-'); return new Date(y, m - 1, 1).toLocaleDateString('en-AU', { month: 'short', year: '2-digit' }); };
  return '<div class="matrix-wrap"><table class="matrix"><thead><tr>'
    + '<th class="sticky-col">Staff</th><th class="tot">Total</th>'
    + months.map((k) => `<th>${mLabel(k)}</th>`).join('') + '</tr></thead><tbody>'
    + staff.map((nm) => `<tr><td class="sticky-col">${esc(nm)}</td><td class="tot">${totals[nm]}</td>`
        + months.map((k) => { const v = (cell[nm] || {})[k]; return v ? `<td class="hit">${v}</td>` : '<td></td>'; }).join('')
        + '</tr>').join('')
    + '</tbody></table></div>';
}

let trendChart;
function drawTrend(labels, totals, fives) {
  const ctx = $('#trend'); if (!ctx) return;
  if (trendChart) trendChart.destroy();
  const pretty = labels.map((k) => { const [y, m] = k.split('-'); return new Date(y, m - 1, 1).toLocaleDateString('en-AU', { month: 'short', year: '2-digit' }); });
  const others = totals.map((t, i) => Math.max(0, t - fives[i]));
  trendChart = new Chart(ctx, {
    type: 'bar',
    data: { labels: pretty, datasets: [
      { label: '5-star', data: fives, backgroundColor: '#063B32', stack: 's', maxBarThickness: 34 },
      { label: 'Other', data: others, backgroundColor: '#cfe3da', stack: 's', borderRadius: 4, maxBarThickness: 34 },
    ] },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: {
          label: (c) => {
            const t = totals[c.dataIndex], f = fives[c.dataIndex];
            if (c.dataset.label === '5-star') return '5-star: ' + f + ' (' + (t ? Math.round(f / t * 100) : 0) + '%)';
            return 'Other: ' + Math.max(0, t - f);
          },
          footer: (items) => 'Total: ' + totals[items[0].dataIndex],
        } } },
      scales: { x: { stacked: true, grid: { display: false }, ticks: { color: '#6b7370', font: { size: 11 } } },
        y: { stacked: true, beginAtZero: true, grid: { color: '#e7e6e0' }, ticks: { color: '#6b7370', font: { size: 11 }, precision: 0 } } } },
  });
}
</script>
</body>
</html>
